name: Weekly Content Update

on:
  schedule:
    # 每周五中午 12:00 北京时间 (UTC+8) = 04:00 UTC
    - cron: '0 4 * * 5'
  workflow_dispatch:
    # 支持手动触发

jobs:
  update:
    # 在本地 Mac 执行（复用 ClaudeNotice 的 self-hosted runner）
    runs-on: self-hosted
    permissions:
      contents: write

    timeout-minutes: 60

    # ── 认证说明 ──────────────────────────────────────────────
    # self-hosted runner 是 launchd 后台服务，无法读取 GUI 登录会话钥匙串里的
    # claude.ai 订阅登录态，claude 会报 "Not logged in · Please run /login"。
    # macOS 上 Claude Code 只用钥匙串、无文件回退，因此 CI 里改用 ANTHROPIC_API_KEY：
    # 它作为 X-Api-Key 头直接发送、完全绕开钥匙串，并走独立 API 计费
    # （与组织禁用的「订阅额度长期令牌复用」互不冲突）。
    # 需在仓库 Settings → Secrets and variables → Actions 配置 ANTHROPIC_API_KEY。
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 拉取最新代码
        run: |
          # 国内访问 GitHub 偶发网络抖动（HTTP2 framing / 连接超时），加 3 次重试
          for attempt in 1 2 3; do
            if git pull origin main --rebase; then
              break
            fi
            git rebase --abort 2>/dev/null || true
            if [ "$attempt" -lt 3 ]; then
              echo "git pull 失败，30s 后重试（第 $attempt 次）..."
              sleep 30
            else
              echo "❌ git pull 重试 3 次仍失败"
              exit 1
            fi
          done

      - name: 检查 Claude CLI 与认证
        run: |
          command -v claude || { echo "❌ claude CLI not found"; exit 1; }
          claude --version || true
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ 未配置 ANTHROPIC_API_KEY secret"
            echo "   请在仓库 Settings → Secrets and variables → Actions 添加 ANTHROPIC_API_KEY"
            exit 1
          fi
          echo "✅ Claude CLI ready，已检测到 ANTHROPIC_API_KEY"

      - name: 运行 Claude Code 搜索更新
        timeout-minutes: 45
        run: |
          set -o pipefail
          # 防止 Mac 休眠
          caffeinate -s -w $$ &

          PROMPT="Today is $(date +%Y-%m-%d). $(cat .github/prompts/weekly-update.md)"
          echo "🔍 开始搜索最新算法自动化工具..."

          # pipefail 确保 claude 认证/运行失败（非零退出）会让整个步骤变红，
          # 而不是被 stream-parser 吞掉——这正是本仓库和 ClaudeNotice 的区别。
          claude -p "$PROMPT" \
            --max-turns 25 \
            --verbose \
            --output-format stream-json \
            --allowedTools "WebSearch,Read,Edit,Write,Glob,Grep,Bash(git diff*),Bash(git status*),Bash(wc *),Bash(date*)" \
            2>&1 | tee /tmp/awesome-algo-update.log | python3 -u .github/scripts/stream-parser.py 2>/dev/null

          echo "✅ Claude 搜索完成"

      - name: 提交并推送
        run: |
          git config user.name  "AlgoTools Bot"
          git config user.email "bot@awesome-algo-tools.local"

          # 暂存主文件
          git add README.md "算法自动化训练.md"

          # 检查是否有实际变更
          if git diff --cached --quiet; then
            echo "📭 本周无新工具，跳过提交"
            exit 0
          fi

          echo "📝 检测到变更："
          git diff --cached --stat

          git commit -m "chore: weekly update $(date +%Y-%m-%d)

          Automated scan for new algorithm automation tools.

          Co-Authored-By: Claude <noreply@anthropic.com>"

          # push 加 3 次重试，覆盖瞬时网络抖动 / 远端分叉（借鉴 ClaudeNotice）
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "✅ 已推送到 main（第 $attempt 次尝试）"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "push 失败，pull --rebase 后重试（第 $attempt 次）..."
              git pull --rebase origin main || git rebase --abort || true
              sleep 30
            else
              echo "❌ push 重试 3 次仍失败"
              exit 1
            fi
          done
