name: Weekly Content Update

on:
  schedule:
    # Every Friday at 12:00 noon Beijing time (CST, UTC+8) = 04:00 UTC
    - cron: '0 4 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (search only, no PR)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create update branch
        run: |
          git checkout -b auto-update/${{ steps.date.outputs.date }}

      - name: Run Claude Code update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT=$(cat .github/prompts/weekly-update.md)
          claude -p "$PROMPT" \
            --max-turns 30 \
            --allowedTools "WebSearch,Read,Edit,Write,Glob,Grep,Bash(git diff*),Bash(git status*),Bash(wc *)" \
            --output-format text \
            > /tmp/claude-output.txt 2>&1 || true
          echo "=== Claude Output ==="
          cat /tmp/claude-output.txt

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md "算法自动化训练.md"
          # Also add the update log if it exists
          [ -f .github/last-update-log.md ] && git add .github/last-update-log.md || true
          git commit -m "Auto-update: add new tools (${{ steps.date.outputs.date }})

          Weekly automated scan for new algorithm automation tools.

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push -u origin auto-update/${{ steps.date.outputs.date }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Weekly update: new tools (${{ steps.date.outputs.date }})" \
            --body "$(cat <<'EOF'
          ## Summary

          Automated weekly scan for new algorithm automation tools and frameworks.

          This PR was generated by the weekly CI/CD pipeline using Claude Code to:
          1. Search for newly released/updated tools across 10 categories
          2. Verify quality criteria (open source, active, significant)
          3. Add entries to both README.md and 算法自动化训练.md

          ## Review Checklist

          - [ ] New entries are accurate and links work
          - [ ] Table formatting is correct in README.md
          - [ ] Chinese descriptions are appropriate in 算法自动化训练.md
          - [ ] No existing entries were modified or removed
          - [ ] Section numbering is sequential

          ---
          🤖 Auto-generated by [Weekly Update Workflow](.github/workflows/weekly-update.yml)
          EOF
          )" \
            --base main \
            --head auto-update/${{ steps.date.outputs.date }}

      - name: Log no-change result
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No new tools found this week (${{ steps.date.outputs.date }}). Skipping PR creation."
